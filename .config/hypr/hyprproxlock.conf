# Device Configuration
device {
    mac_address = "5C:3E:1B:77:76:CD"
    name = "iPhone"
    enabled = true
    auto_connect = true
}

# Threshold Settings
thresholds {
    lock_threshold = -35
    unlock_threshold = -15
}

# Timing Configuration
timings {
    lock_hold_seconds = 3
    unlock_hold_seconds = 3
    poll_interval = 1
    reconnect_interval = 20
}

# Locker Configuration (optional)
# type: "hyprlock" (default) or "swaylock"
# compositor: "auto" (default), "hyprland", "sway", or "niri"
# Note: swaylock does not support programmatic unlock - device in range will only wake the display
locker {
    type = "swaylock"
    compositor = "niri"
}
